<!DOCTYPE html>
<html>
<head>
    <title>Babylon.js - Anatomy Labels</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        var canvas = document.getElementById("renderCanvas");
        var engine = new BABYLON.Engine(canvas, true);

        var createScene = function () {
            var scene = new BABYLON.Scene(engine);
            scene.createDefaultCameraOrLight(true, true, true);
            scene.clearColor = new BABYLON.Color4(0.1, 0.1, 0.15, 1);

            var camera = scene.activeCamera;
            camera.wheelPrecision = 50; 
            camera.lowerRadiusLimit = 1; 
            camera.upperRadiusLimit = 50; 

            // 1. 전체 UI 캔버스 생성
            var advancedTexture = BABYLON.GUI.AdvancedDynamicTexture.CreateFullscreenUI("UI");

            // 2. 지시선 및 이름표 생성 함수
            var createLabel = function(mesh, text, offsetX, offsetY, color) {
                var label = new BABYLON.GUI.Rectangle("label");
                label.background = "rgba(0, 0, 0, 0.7)";
                label.height = "35px";
                label.width = "100px";
                label.cornerRadius = 10;
                label.thickness = 2;
                label.color = color;
                label.linkOffsetY = offsetY; 
                label.linkOffsetX = offsetX; 
                advancedTexture.addControl(label);
                label.linkWithMesh(mesh); 

                var textBlock = new BABYLON.GUI.TextBlock();
                textBlock.text = text;
                textBlock.color = "white";
                textBlock.fontWeight = "bold";
                label.addControl(textBlock);

                var target = new BABYLON.GUI.Ellipse();
                target.width = "12px";
                target.height = "12px";
                target.color = color;
                target.thickness = 2;
                target.background = "rgba(0, 0, 0, 0.5)";
                advancedTexture.addControl(target);
                target.linkWithMesh(mesh); 

                var line = new BABYLON.GUI.Line();
                line.lineWidth = 2;
                line.color = color;
                line.dash = [5, 5]; 
                advancedTexture.addControl(line);
                line.linkWithMesh(mesh); 
                line.connectedControl = label; 
            };

            // 3. 모델 로드 및 앵커(타겟) 부착
            // 💡 수정됨: 경로를 "./" 에서 "/" 로 변경하여 Vercel 라우팅 오류 방지
            BABYLON.SceneLoader.ImportMeshAsync("", "/", "JadeToad.glb", scene).then((result) => {
                camera.attachControl(canvas, false);
                
                var rootMesh = result.meshes[0];
                rootMesh.position = BABYLON.Vector3.Zero();
                camera.zoomOn(result.meshes, true);
                
                // 머리 위치
                var headAnchor = BABYLON.MeshBuilder.CreateSphere("head", {diameter: 0.1}, scene);
                headAnchor.parent = rootMesh; 
                headAnchor.position = new BABYLON.Vector3(0, 1.5, 0.8); 
                headAnchor.isVisible = false; 

                // 가슴 위치
                var chestAnchor = BABYLON.MeshBuilder.CreateSphere("chest", {diameter: 0.1}, scene);
                chestAnchor.parent = rootMesh;
                chestAnchor.position = new BABYLON.Vector3(0, 0.8, 1.0); 
                chestAnchor.isVisible = false;

                // 배 위치
                var abdomenAnchor = BABYLON.MeshBuilder.CreateSphere("abdomen", {diameter: 0.1}, scene);
                abdomenAnchor.parent = rootMesh;
                abdomenAnchor.position = new BABYLON.Vector3(0, 0.3, -0.5); 
                abdomenAnchor.isVisible = false;

                createLabel(headAnchor, "머리", 120, -120, "Cyan");
                createLabel(chestAnchor, "가슴", -150, -50, "Lime");
                createLabel(abdomenAnchor, "배", 120, 80, "Yellow");

                // 4. 지시선 탄력 테스트용 이동 애니메이션
                var time = 0;
                scene.onBeforeRenderObservable.add(function () {
                    rootMesh.position.y = Math.sin(time) * 0.5; 
                    rootMesh.position.x = Math.cos(time * 0.5) * 0.3; 
                    time += 0.05;
                });
            }).catch((error) => {
                // 💡 추가됨: 파일 로드 실패 시 콘솔 에러 및 알림창 띄우기
                console.error("3D 모델 로드 실패:", error);
                alert("3D 모델(JadeToad.glb)을 불러오지 못했습니다. 파일 위치나 이름을 확인해주세요.");
            });

            return scene;
        };

        var scene = createScene();
        engine.runRenderLoop(function () {
            scene.render();
        });

        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
